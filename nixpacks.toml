[providers]
providers = ["node", "python"]

[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "ffmpeg"]

# Install latest yt-dlp via pip (supports mediaconnect client for bot detection bypass)
[phases.install]
cmds = ["pip install --no-cache-dir yt-dlp", "npm install"]

[start]
cmd = "npm start"
